<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduBot TKJ - Gemini AI Chatbot</title>
  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app-background"></div>
  <div class="container">
    <!-- Header Section -->
    <header class="chat-header">
      <div class="bot-info">
        <div class="avatar-container">
          <!-- Robot / Network Circuit SVG Avatar -->
          <svg class="bot-avatar" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="avatar-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3b82f6" />
                <stop offset="100%" stop-color="#8b5cf6" />
              </linearGradient>
            </defs>
            <circle cx="50" cy="50" r="48" fill="url(#avatar-grad)" />
            <!-- Inner details -->
            <path d="M30,40 Q50,25 70,40" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" />
            <rect x="28" y="44" width="44" height="28" rx="8" fill="#1e1b4b" stroke="white" stroke-width="3" />
            <!-- Eyes -->
            <circle cx="40" cy="54" r="4" fill="#60a5fa" class="eye-glow" />
            <circle cx="60" cy="54" r="4" fill="#a78bfa" class="eye-glow" />
            <!-- Mouth / Circuit line -->
            <path d="M42,64 L58,64" stroke="white" stroke-width="2" stroke-linecap="round" />
            <line x1="50" y1="28" x2="50" y2="18" stroke="white" stroke-width="3" />
            <circle cx="50" cy="15" r="4" fill="#a78bfa" />
          </svg>
          <span class="status-indicator"></span>
        </div>
        <div class="bot-meta">
          <h2>EduBot TKJ</h2>
          <p>Guru Jaringan & Komputer Virtual</p>
        </div>
      </div>
      <button id="clear-btn" class="header-action-btn" title="Bersihkan Percakapan">
        <!-- Trash Icon SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>
      </button>
    </header>

    <!-- Chat Box -->
    <div id="chat-box" class="chat-box"></div>

    <!-- Recommendations / Prompt Chips -->
    <div class="chips-container">
      <span class="chips-title">Rekomendasi Pertanyaan:</span>
      <div id="prompt-chips" class="prompt-chips">
        <button class="chip" data-question="Apa itu Router dan fungsinya?">🌐 Apa itu Router?</button>
        <button class="chip" data-question="Bagaimana cara kerja IP Address?">📍 Cara kerja IP Address</button>
        <button class="chip" data-question="Jelaskan perbedaan Switch Hub dengan Switch Management">🔌 Perbedaan Switch</button>
        <button class="chip" data-question="Sebutkan alat-alat yang digunakan untuk membuat kabel LAN crimping">🛠️ Alat kabel LAN</button>
      </div>
    </div>

    <!-- Input Form -->
    <form id="chat-form" class="chat-form">
      <div class="input-wrapper">
        <input type="text" id="user-input" placeholder="Tanyakan materi TKJ (alat, IP, topologi)..." autocomplete="off" required />
      </div>
      <button type="submit" id="send-btn" title="Kirim Pesan">
        <!-- Send SVG Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </form>
  </div>
  <script src="script.js"></script>
</body>

</html>
